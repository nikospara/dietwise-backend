<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8"/>
	<meta http-equiv="Cache-Control" content="no-store, max-age=0"/>
	<meta http-equiv="Pragma" content="no-cache"/>
	<meta name="referrer" content="no-referrer"/>
	<title>Responsible Cooking Alliance</title>
</head>
<body>
<p id="status">Completing sign-in…</p>
<script>
	const params = new URLSearchParams(location.search);
	const code = params.get('code');
	const state = params.get('state');
	const status = document.getElementById('status');
	const message = {
		type: 'KEYCLOAK_CALLBACK',
		source: 'dietwise-extension-callback',
		code,
		state,
	};

	if (location.search) {
		history.replaceState(null, '', location.pathname);
	}

	// Send the callback data only to this page's origin; the extension content script can observe it there.
	if (code) {
		window.postMessage(message, location.origin);
	}

	window.close();

	setTimeout(() => {
		if (status && !window.closed) {
			status.textContent = 'Sign-in complete. You may close this tab.';
		}
	}, 200);
</script>
</body>
</html>
